name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint PHP
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'

      - name: Syntax-check every PHP file
        run: |
          find . -name "*.php" -not -path "./vendor/*" -print0 \
            | xargs -0 -n1 php -l

  test:
    name: Test (boot app + smoke check)
    runs-on: ubuntu-latest
    needs: lint

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root_pass
          MYSQL_DATABASE: agrilink
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -uroot -proot_pass"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10

    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: pdo, pdo_mysql

      - name: Load schema and seed data
        run: |
          mysql -h 127.0.0.1 -uroot -proot_pass agrilink < database/schema.sql
          mysql -h 127.0.0.1 -uroot -proot_pass agrilink < database/seed.sql

      - name: Boot app with PHP's built-in server
        env:
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_NAME: agrilink
          DB_USER: root
          DB_PASSWORD: root_pass
        run: |
          php -S 127.0.0.1:8000 &
          sleep 2

      - name: Verify homepage returns HTTP 200
        run: |
          status=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:8000/index.php)
          echo "Homepage responded with status $status"
          if [ "$status" -ne 200 ]; then
            echo "Homepage did not return 200"
            exit 1
          fi

  build:
    name: Build Docker image
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t agrilink-rwanda:ci .

  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Trigger Render deploy hook
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK_URL" ]; then
            echo "RENDER_DEPLOY_HOOK_URL secret not set, skipping deploy trigger."
            exit 0
          fi
          curl -fsSL -X POST "$RENDER_DEPLOY_HOOK_URL"