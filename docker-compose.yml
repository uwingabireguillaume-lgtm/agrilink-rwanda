version: "3.8"

services:
  app:
    build: .
    container_name: agrilink_app
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: agrilink
      DB_USER: agrilink_user
      DB_PASSWORD: agrilink_pass
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - uploads_data:/var/www/html/uploads

  db:
    image: mysql:8.0
    container_name: agrilink_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root_pass
      MYSQL_DATABASE: agrilink
      MYSQL_USER: agrilink_user
      MYSQL_PASSWORD: agrilink_pass
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/1-schema.sql
      - ./database/seed.sql:/docker-entrypoint-initdb.d/2-seed.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot_pass"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  db_data:
  uploads_data: